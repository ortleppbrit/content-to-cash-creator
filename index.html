  Leader:{e:"👑",k:"Klar, direkt, stark",w:"Aktive, klare Sprache ohne Modalverben. Führt durch Klarheit und Haltung. Kein Weichspülen.",b:"Du führst, indem du entscheidest."},
  Mentorin:{e:"🤍",k:"Warm, weise, vertrauensvoll",w:"Emotionale, ruhige Sprache. Tiefe Einblicke, persönliche Wärme. Schafft Vertrauen durch Nähe.",b:"Vertrauen ist der Beginn jeder Veränderung."},
  Visionary:{e:"🚀",k:"Groß, inspirierend, bewegend",w:"Bildhafte, große Sprache. Zukunftsorientiert, visionär. Erzeugt Aufbruch und Bewegung.",b:"Du erschaffst nicht Posts, du formst Gedanken."},
  Connector:{e:"💬",k:"Nahbar, ehrlich, humorvoll",w:"Alltagssprache, locker, humorvoll. Schafft Nähe durch Authentizität und echte Momente.",b:"Ich sags ehrlich: Das hatte ich nicht erwartet."},
  Rebell:{e:"🔥",k:"Kantig, provokant, mutig",w:"Konfrontativ, mutig, kurz. Polarisiert bewusst. Unbequeme Wahrheiten ohne Weichspülen.",b:"Brav verkauft nicht."},
};

const SYSTEM=`Du bist der Content to Cash Creator von Brit Ortlepp. Du erstellst Leadership-Content nach dem 3x3 Content to Cash Code.

ABSOLUT WICHTIGE REGEL ZU HOOKS:
Hooks MÜSSEN auf den konkreten Eingaben des Users basieren – insbesondere auf Ebene 2 (Psychografie) und Ebene 3 (Transformation).
NIEMALS generische Hooks schreiben. Jeden Hook DIREKT aus den echten Schmerzen, Sehnsüchten und Glaubenssätzen der Traumkundin entwickeln.
Qualitätsprüfung: Wenn die Traumkundin den Hook liest, muss sie denken "Das bin ich – sie spricht von MIR."
Konkrete Details aus den User-Eingaben müssen im Hook erkennbar sein.

Hook-Typen die du nutzt:
- Storytelling-Hook (Ich-Version mit konkreten Zahlen aus der Brandstory)
- Spiegel-Hook (Traumkundin erkennt sich sofort an konkretem Detail aus Ebene 2)
- Konfrontations-Hook (basierend auf echten Glaubenssätzen aus Ebene 2)
- Zahl & Nutzen (mit konkreten Ergebnissen aus der Brandstory)
- Truthbomb (basierend auf echten Schmerzpunkten aus Ebene 2)
- Open-Loop (aus Transformation Ebene 3 – was die Traumkundin WIRKLICH will)

CAPTION-REGELN:
- Erste Zeile knallt rein – entscheidet ob weitergelesen wird
- Emotional, konkret, klingt wie ein echter Mensch
- Sätze dürfen lang und komplex sein – keine Stakkato-Sprache
- Brand-Voice der Person muss durchgehend spürbar sein
- VERBOTEN: "auf das nächste Level", "in dieser schnelllebigen Zeit", "Lass uns gemeinsam", "Mehrwert"
- Wenn Caption-Beispiele hochgeladen wurden: exakt diesen Stil adaptieren
- Grammatik und Rechtschreibung PERFEKT

3x3 CONTENT TO CASH CODE:
1. AUTHORITY: Expertise & Haltung zeigen – Scroll-Stopp erzeugen
2. DEMAND: Verlangen & Verbindung wecken – Sehnsucht aktivieren
3. CONVERSION: Kaufentscheidung herbeiführen – Einwände auflösen

CONTENTPLÄNE:
Wachstum: Authority 60% | Demand 30% | Conversion 10%
Verbindung: Authority 30% | Demand 50% | Conversion 20%
Launch: Authority 20% | Demand 30% | Conversion 50%

REEL-VARIANTEN (IMMER BEIDE):
A: Statischer Hook – Text auf dem Cover
B: Talking-Head – vollständiges Sprechskript

KARUSSELL: mind. 6 Slides. Slide 1 = Hook. Letzter Slide = CTA.
STORIES: Hook → Spiegelung → Positionierung → Öffnung → Einladung
BONUS: Kreative Bonus-Idee am Ende

FORMAT:
## GESAMTÜBERSICHT

## WOCHE X

## HOOK-BANK
[8 Hooks – alle direkt aus den User-Eingaben entwickelt]

## BONUS-IDEE
[Kreative ausgefallene Idee]

Schreibe auf Deutsch, in du-Form. Brand-Voice konsequent. Grammatik perfekt.`;

async function api(prompt,max=8000,images=[]){
  const msgs=[{role:"user",content:images.length>0?[...images.map(img=>({type:"image",source:{type:"base64",media_type:img.type,data:img.data}})),{type:"text",text:prompt}]:prompt}];
  const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,max_tokens:max,messages:msgs,has_images:images.length>0})});
  if(!r.ok) throw new Error("Fehler "+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text||"";
}

  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  return React.createElement("div",{className:"toast"},"✓ "+msg);
}

function IN({val,set,ph,sty={},rows}){
  if(rows) return React.createElement("textarea",{value:val,onChange:e=>set(e.target.value),placeholder:ph,rows,style:{...s_inp,resize:"vertical",lineHeight:1.6,...sty}});
  return React.createElement("input",{value:val,onChange:e=>set(e.target.value),placeholder:ph,style:{...s_inp,...sty}});
}
function Chip({on,active,children}){return React.createElement("button",{onClick:on,style:s_chip(active)},children)}
function Grp({label,err,children}){
  return React.createElement("div",{style:{marginBottom:20}},
    React.createElement("label",{style:{display:"block",color:err?"#c0392b":BLUE,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8,fontWeight:700}},label),
    children,
    err&&React.createElement("div",{style:{color:"#c0392b",fontSize:12,marginTop:6}},"⚠️ "+err)

}

  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState("");
  const [copied,setCopied]=useState(false);
  const [lt,setLt]=useState(""),[ll,setLl]=useState("");
  const [kwSug,setKwSug]=useState([]),[kwL,setKwL]=useState(false);

  const up=(k,v)=>setP(x=>({...x,[k]:v}));
  const ug=(k,v)=>setGen(x=>({...x,[k]:v}));
  const showToast=msg=>setToast(msg);

  // Profil-Key basierend auf User-Email
  const profileKey=useCallback(email=>"ctc_p5_"+email.replace(/[^a-z0-9]/gi,"_"),[]);

      const s=localStorage.getItem("ctc_user_v2");
      if(s){

        const ps=localStorage.getItem(pk);
        if(ps){setP(JSON.parse(ps));setSaved(true);}
        setView("home");
      }
    }catch(e){}
  },[]);

  useEffect(()=>{
    if(view!=="login") return;
    const t=setTimeout(()=>{
      try{
        window.google.accounts.id.initialize({client_id:GID,callback:onLogin});

      }catch(e){}
    },800);
    return()=>clearTimeout(t);
  },[view]);

  const onLogin=res=>{
    try{
      const pl=JSON.parse(atob(res.credential.split(".")[1]));
      const u={name:pl.name,email:pl.email,picture:pl.picture};
      setUser(u);
      localStorage.setItem("ctc_user_v2",JSON.stringify(u));
      const pk=profileKey(u.email);
      const ps=localStorage.getItem(pk);
      if(ps){setP(JSON.parse(ps));setSaved(true);}
      setView("home");
    }catch(e){console.error(e);}
  };

  const logout=()=>{
    setUser(null);setView("login");setSaved(false);setP(empty);
    localStorage.removeItem("ctc_user_v2");
  };

  const validate=()=>{
    const e={};
    if(!p.branche.trim()) e.branche="Pflichtfeld";
    if(!p.brandstatement.trim()) e.brandstatement="Pflichtfeld";
    if(!p.brandstory.trim()) e.brandstory="Pflichtfeld";
    if(!p.e2.trim()) e.e2="Pflichtfeld";
    if(!p.e3.trim()) e.e3="Pflichtfeld";
    if(p.angebote.length===0) e.angebote="Mindestens 1 Angebot";
    setErr(e);
    return Object.keys(e).length===0;
  };

  const saveP=(silent=false)=>{
    if(!validate()){setTab(0);return false;}
    if(!user){showToast("Bitte zuerst einloggen");return false;}
    try{
      const pk=profileKey(user.email);
      const toSave={...p,captionImages:[]};// Bilder nicht im localStorage – zu groß
      localStorage.setItem(pk,JSON.stringify(toSave));
      setSaved(true);
      if(!silent){showToast("Profil gespeichert ✓");setView("home");}
      else showToast("Zwischenstand gespeichert ✓");
      return true;
    }catch(e){showToast("Fehler beim Speichern");return false;}
  };

  const addA=()=>{
    if(!newA.name.trim()) return;
    up("angebote",[...p.angebote,{...newA,id:Date.now()}]);
    setNewA({name:"",desc:"",price:""});
  };

  const toggleA=id=>ug("sel",gen.sel.includes(id)?gen.sel.filter(x=>x!==id):[...gen.sel,id]);

  const addL=()=>{
    if(!lt.trim()) return;
    up("lernen",[...p.lernen,{id:Date.now(),label:ll||"Caption",text:lt}]);
    setLt("");setLl("");
    showToast("Caption gespeichert");
  };

  // Bild-Upload für Caption-Stil
  const handleImgUpload=async(e)=>{
    const files=Array.from(e.target.files);
    if(!files.length) return;
    showToast("Bilder werden verarbeitet...");
    const imgs=await Promise.all(files.map(f=>new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const base64=ev.target.result.split(",")[1];
        res({data:base64,type:f.type||"image/jpeg",name:f.name});
      };
      reader.onerror=rej;
      reader.readAsDataURL(f);
    })));
    // Caption-Stil analysieren
    try{
      const analysis=await api(
        "Analysiere den Schreibstil dieser Caption-Screenshots. Beschreibe in 3-5 Sätzen: Satzbau, Tonalität, typische Formulierungen, Länge, emotionale Qualität. Nutze diese Analyse später für Content-Erstellung.",
        500,imgs
      );
      up("captionStyle",analysis);
      up("captionImages",imgs.map(i=>i.name));
      showToast("Stil analysiert und gespeichert ✓");
    }catch(e){showToast("Bilder gespeichert (Analyse später)");}
  };

  const sugKW=async()=>{
    setKwL(true);
    try{const t=await api("Schlage 10 Instagram-Keywords fuer diese Nische vor: "+p.branche+". Nur kommagetrennte Liste.",300);setKwSug(t.split(",").map(k=>k.trim()).filter(Boolean));}catch(e){}
    setKwL(false);
  };

  const addKW=kw=>{
    const c=p.kw?p.kw.split(",").map(k=>k.trim()).filter(Boolean):[];
    if(!c.includes(kw)) up("kw",[...c,kw].join(", "));
  };

  // profileComplete – prüft alle Pflichtfelder
  const pC=!!(p.branche&&p.branche.trim()&&p.brandstatement&&p.brandstatement.trim()&&p.brandstory&&p.brandstory.trim()&&p.e2&&p.e2.trim()&&p.e3&&p.e3.trim()&&p.angebote&&p.angebote.length>0);

  const generate=async()=>{
    if(!pC){showToast("Bitte zuerst Profil vervollständigen");setView("profile");return;}
    setLoading(true);setView("result");setResult("");
    const sel=p.angebote.filter(a=>gen.sel.includes(a.id));
    const ang=(sel.length>0?sel:p.angebote).map(a=>`- ${a.name}${a.price?" ("+a.price+")":""}${a.desc?": "+a.desc:""}`).join("\n");
    const lc=p.lernen.length>0?"\n\nMEINE EIGENEN CAPTION-BEISPIELE (adaptiere diesen Stil):\n"+p.lernen.map(l=>"--- "+l.label+" ---\n"+l.text).join("\n\n"):"";

    const prompt=[
      "Erstelle einen vollständigen Content-Plan nach dem 3x3 Content to Cash Code.",
      "WICHTIG: Entwickle ALLE Hooks direkt aus den unten stehenden Profil-Eingaben. Keine generischen Hooks!",

      "Branche: "+p.branche,
      "Brand-Statement: "+p.brandstatement,
      "Brandstory: "+p.brandstory,
      "","TRAUMKUNDIN:",
      "Ebene 1 (nur Format-Kontext): "+(p.e1||"-"),
      "Ebene 2 – Psychografie (HAUPTQUELLE für alle Hooks und Captions): "+p.e2,
      "Ebene 3 – Transformation (HAUPTQUELLE für alle Hooks und Captions): "+p.e3,
      "","ANGEBOTE:",ang,
      "","VOICE:",
      "Haupt-Voice: "+p.v1+" – "+VOICES[p.v1]?.w,
      "2. Voice: "+p.v2+" – "+VOICES[p.v2]?.w,
      "Typische Phrasen: "+(p.vw||"-"),
      "","Keywords: "+(p.kw||"-"),
      "Format-Präferenz: "+p.fmt,
      "Plattform: "+p.plattform,
      "","Zeitraum: "+gen.weeks+" Woche(n)",
      "Feed-Posts/Woche: "+gen.days+"x",
      "Stories/Woche: "+gen.stories+"x",
      "Content-Ziel: "+gen.goal,
      gen.theme?"Schwerpunkt-Thema: "+gen.theme:"",
      lc,cs
    ].filter(Boolean).join("\n");

    try{const t=await api(prompt);setResult(t);}catch(e){setResult("Fehler: "+e.message);}
    setLoading(false);
  };

  const copyAll=()=>{navigator.clipboard.writeText(result);setCopied(true);setTimeout(()=>setCopied(false),2000);showToast("Kopiert!");};
  const dlTxt=()=>{const b=new Blob([result],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="content-plan.txt";a.click();URL.revokeObjectURL(u);};

  const tabs=["🏢 Basics","👩 Traumkundin","💎 Angebote","🎤 Voice","📚 Lernen"];

  return React.createElement("div",{style:{minHeight:"100vh",background:BG,fontFamily:"Montserrat,Arial,sans-serif",color:DARK,display:"flex",flexDirection:"column"}},

    // TOAST
    toast&&React.createElement(Toast,{msg:toast,onDone:()=>setToast(null)}),

      React.createElement("img",{src:LOGO,alt:"Logo",style:{height:36,filter:"brightness(10)",objectFit:"contain"}}),
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{color:YEL,fontSize:11,letterSpacing:3,textTransform:"uppercase",fontWeight:700}},"Content to Cash Creator")

      user&&React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("img",{src:user.picture,style:{width:32,height:32,borderRadius:"50%",border:`2px solid ${YEL}`}}),
        React.createElement("span",{style:{color:WHI,fontSize:13,fontWeight:600}},user.name.split(" ")[0]),
        view!=="home"&&React.createElement("button",{onClick:()=>setView("home"),style:{background:"transparent",color:WHI,border:"1px solid rgba(255,255,255,.4)",borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13}},"🏠"),
        React.createElement("button",{onClick:logout,style:{background:"transparent",color:WHI,border:"1px solid rgba(255,255,255,.4)",borderRadius:20,padding:"7px 14px",cursor:"pointer",fontSize:13}},"Logout")
      )
    ),

    // MAIN
    React.createElement("main",{style:{flex:1,maxWidth:820,margin:"0 auto",width:"100%",padding:"28px 18px 40px"}},

      // LOGIN
      view==="login"&&React.createElement("div",{style:{textAlign:"center",paddingTop:32}},
        React.createElement("img",{src:FRING,alt:"Brit",className:"login-img",style:{width:260,height:360,objectFit:"cover",borderRadius:20,boxShadow:"0 8px 40px rgba(0,0,0,.15)",marginBottom:28}}),
        React.createElement("h1",{style:{fontSize:26,fontWeight:900,marginBottom:8,color:BLUE}},"Content to Cash Creator"),
        React.createElement("p",{style:{color:MID,fontSize:14,marginBottom:8,maxWidth:400,margin:"0 auto 8px"}},"Dein KI-Tool für Leadership-Content nach dem 3x3 Content to Cash Code"),
        React.createElement("p",{style:{color:BLUE,fontWeight:700,marginBottom:32}},"by Brit Ortlepp"),
        React.createElement("div",{style:{background:CARD,borderRadius:20,padding:32,maxWidth:380,margin:"0 auto",boxShadow:"0 4px 24px rgba(0,0,0,.08)"}},
          React.createElement("p",{style:{fontSize:14,color:MID,marginBottom:24,lineHeight:1.7}},"Melde dich mit deinem Google-Account an. Dein Profil wird automatisch gespeichert."),
          React.createElement("div",{id:"gbtn",style:{display:"flex",justifyContent:"center"}}),

        )

      // HOME

        React.createElement("div",{className:"grid2",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24,alignItems:"center"}},
          React.createElement("div",null,
            React.createElement("h1",{style:{fontSize:24,fontWeight:900,marginBottom:8,color:DARK}},"Content to Cash Creator"),

              // NUR EIN Button – je nach Status
              pC

              saved&&React.createElement("button",{onClick:()=>setView("profile"),style:{...s_btn("transparent",BLUE,`1px solid ${BLUE}`),padding:"12px",width:"100%"}},"✏️ Profil bearbeiten")
            )

        ),

      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
