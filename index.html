async function api(prompt,max=8000,images=[]){
  const msgs=[{role:"user",content:images.length>0?[...images.map(img=>({type:"image",source:{type:"base64",media_type:img.type,data:img.data}})),{type:"text",text:prompt}]:prompt}];

  if(!r.ok) throw new Error("Fehler "+r.status);
  const d=await r.json();
  if(d.error) throw new Error(d.error);
  return d.text||"";
}

function getMissing(p){
  const m=[];
  if(!p.branche?.trim()) m.push("Branche & Nische");
  if(!p.brandstatement?.trim()) m.push("Brand-Statement");
  if(!p.brandstory?.trim()) m.push("Brandstory");
  if(!p.e2?.trim()) m.push("Traumkundin – Psychografie");
  if(!p.e3?.trim()) m.push("Traumkundin – Transformation");
  if(!p.angebote?.length) m.push("Mindestens 1 Angebot");
  return m;
}
