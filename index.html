}

function Renderer({text}){
  const lines=text.split("\n"),out=[];
  let inT=false,rows=[];
  const flush=()=>{
    if(!rows.length) return;
    const cols=r=>r.split("|").filter((_,i,a)=>i>0&&i<a.length-1);
    out.push(React.createElement("div",{key:"t"+out.length,style:{overflowX:"auto",margin:"12px 0 20px"}},
      React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
        React.createElement("thead",null,React.createElement("tr",null,...cols(rows[0]).map((h,i)=>React.createElement("th",{key:i,style:{background:BLUE,color:WHI,padding:"8px 10px",textAlign:"left",fontWeight:700,whiteSpace:"nowrap"}},h.trim())))),
        React.createElement("tbody",null,...rows.slice(2).map((row,ri)=>React.createElement("tr",{key:ri,style:{background:ri%2===0?"#f9f7f5":WHI}},...cols(row).map((c,ci)=>React.createElement("td",{key:ci,style:{padding:"7px 10px",borderBottom:`1px solid ${BOR}`,verticalAlign:"top"}},c.trim())))))
      )
    ));
    rows=[];inT=false;
  };
  lines.forEach((l,i)=>{
    if(l.startsWith("|")){inT=true;rows.push(l);return;}
    if(inT) flush();
    if(l.startsWith("# ")) out.push(React.createElement("h1",{key:i,style:{color:BLUE,fontSize:20,fontWeight:900,margin:"24px 0 10px",borderBottom:`2px solid ${YEL}`,paddingBottom:6}},l.slice(2)));
    else if(l.startsWith("## ")) out.push(React.createElement("h2",{key:i,style:{color:BLUE,fontSize:16,fontWeight:800,margin:"20px 0 8px"}},l.slice(3)));
    else if(l.startsWith("### ")) out.push(React.createElement("h3",{key:i,style:{color:DARK,fontSize:14,fontWeight:800,margin:"14px 0 6px",background:"#f0ebe6",padding:"8px 12px",borderRadius:8,borderLeft:`3px solid ${YEL}`}},l.slice(4)));
    else if(l.startsWith("**")&&l.includes(":**")){const x=l.indexOf(":**");out.push(React.createElement("p",{key:i,style:{margin:"5px 0"}},React.createElement("strong",{style:{color:BLUE}},l.slice(2,x)+":"),l.slice(x+3).replace(/\*\*/g,"")));}
    else if(l.startsWith("- ")||l.startsWith("* ")) out.push(React.createElement("li",{key:i,style:{marginLeft:20,marginBottom:3,lineHeight:1.75}},l.slice(2)));
    else if(l.trim()==="") out.push(React.createElement("div",{key:i,style:{height:6}}));
    else out.push(React.createElement("p",{key:i,style:{margin:"3px 0",lineHeight:1.85}},l.replace(/\*\*/g,"")));
  });
  if(inT) flush();
  return React.createElement(React.Fragment,null,...out);
}
